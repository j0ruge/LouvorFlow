name: CI Backend

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: yarn workspace backend run prisma generate

      - run: yarn workspace backend run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: louvorflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: yarn workspace backend run prisma generate

      - run: yarn workspace backend run test
        env:
          DB_URL: postgresql://test:test@localhost:5432/louvorflow_test?schema=public
