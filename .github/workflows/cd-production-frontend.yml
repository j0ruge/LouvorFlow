name: CD Production Frontend

on:
  push:
    tags:
      - 'frontend-v*'

permissions:
  packages: write
  contents: read

concurrency:
  group: deploy-production-louvorflow-frontend
  cancel-in-progress: false

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn workspace vite_react_shadcn_ts run lint

      - name: Test
        run: yarn workspace vite_react_shadcn_ts run test

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/j0ruge/louvorflow-web:${{ github.ref_name }}
            ghcr.io/j0ruge/louvorflow-web:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  deploy:
    name: Deploy Production
    runs-on: [self-hosted, production]
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate .env
        working-directory: infra/frontend
        run: |
          umask 077
          cat <<'EOF' > .env
          IMAGE_TAG=${{ github.ref_name }}
          NGINX_NETWORK_NAME=${{ secrets.NGINX_NETWORK_NAME }}
          VIRTUAL_HOST=${{ secrets.FRONTEND_VIRTUAL_HOST }}
          EOF

      - name: Deploy
        working-directory: infra/frontend
        run: |
          docker compose -p louvorflow-web pull
          docker compose -p louvorflow-web up -d --force-recreate

      - name: Cleanup images
        run: docker image prune -f --filter "label=org.opencontainers.image.source=https://github.com/j0ruge/LouvorFlow"

      - name: Cleanup .env
        if: always()
        working-directory: infra/frontend
        run: rm -f .env
