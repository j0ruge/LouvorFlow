name: CD Production Backend

on:
  push:
    tags:
      - 'backend-v*'

permissions:
  packages: write
  contents: read

concurrency:
  group: deploy-production-louvorflow-backend
  cancel-in-progress: false

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: louvorflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - name: Generate Prisma Client
        run: yarn workspace backend run prisma generate
        env:
          DB_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Lint
        run: yarn workspace backend run typecheck

      - name: Test
        run: yarn workspace backend run test
        env:
          DB_URL: postgresql://test:test@localhost:5432/louvorflow_test?schema=public

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/j0ruge/louvorflow-api:${{ github.ref_name }}
            ghcr.io/j0ruge/louvorflow-api:latest

  deploy:
    name: Deploy Production
    runs-on: [self-hosted, production]
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run database migrations
        run: |
          yarn install --frozen-lockfile
          cd packages/backend && npx prisma migrate deploy
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: Generate .env
        working-directory: infra/backend
        run: |
          umask 077
          cat <<'EOF' > .env
          HOST=${{ secrets.HOST }}
          PORT=${{ secrets.PORT }}
          DB_URL=${{ secrets.DB_URL }}
          APP_SECRET=${{ secrets.APP_SECRET }}
          ACCESS_TOKEN_EXPIRES_IN=${{ secrets.ACCESS_TOKEN_EXPIRES_IN }}
          APP_SECRET_REFRESH_TOKEN=${{ secrets.APP_SECRET_REFRESH_TOKEN }}
          REFRESH_TOKEN_EXPIRES_IN=${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_EXPIRES_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRES_DAYS }}
          APP_API_URL=${{ secrets.APP_API_URL }}
          APP_WEB_URL=${{ secrets.APP_WEB_URL }}
          NODE_ENV=${{ secrets.NODE_ENV }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME=${{ secrets.ADMIN_NAME }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          IMAGE_TAG=${{ github.ref_name }}
          NGINX_NETWORK_NAME=${{ secrets.NGINX_NETWORK_NAME }}
          VIRTUAL_HOST=${{ secrets.VIRTUAL_HOST }}
          EOF

      - name: Deploy
        working-directory: infra/backend
        run: |
          docker compose -p louvorflow-api pull
          docker compose -p louvorflow-api up -d --force-recreate

      - name: Cleanup images
        run: docker image prune -f --filter "label=org.opencontainers.image.source=https://github.com/j0ruge/LouvorFlow"

      - name: Cleanup .env
        if: always()
        working-directory: infra/backend
        run: rm -f .env
